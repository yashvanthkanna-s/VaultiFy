# =============================================
# Vaultify — Application Configuration
# =============================================

# Application
spring.application.name=vaultify
server.port=8080

# =============================================
# H2 Database (Development)
# To swap: replace with DynamoDB config later
# =============================================
spring.datasource.url=jdbc:h2:file:./vaultify-db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Console (Development Only — disable in production)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# =============================================
# Multipart File Upload
# =============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# =============================================
# Vaultify Storage Config
# To swap: point to S3 bucket config later
# =============================================
vaultify.storage.location=./uploads
vaultify.max-file-size=52428800
vaultify.max-storage-per-user=524288000

# =============================================
# JWT Configuration
# =============================================
# Secret must be at least 32 characters (256-bit for HS256)
jwt.secret=vaultify-super-secret-key-for-jwt-token-signing-2024-secure-storage
jwt.expiration=86400000

# =============================================
# Logging
# =============================================
logging.level.com.vaultify=INFO
logging.level.org.springframework.security=WARN
