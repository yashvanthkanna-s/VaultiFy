<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Your Vaultify profile — storage stats and account info.">
    <title>Profile — Vaultify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body class="dashboard-page">

    <!-- ========== SIDEBAR ========== -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="nav-logo">
                <div class="logo-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <rect x="2" y="4" width="20" height="16" rx="3" fill="#2563EB"/>
                        <path d="M7 9h10M7 12h7" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                        <circle cx="18" cy="16" r="4" fill="#1D4ED8"/>
                        <path d="M16.5 16l1 1 2-2" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <span class="logo-text">Vaultify</span>
            </a>
        </div>

        <nav class="sidebar-nav">
            <a href="dashboard.html" class="sidebar-link" id="nav-dashboard">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
                    <rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
                    <rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
                    <rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
                </svg>
                <span>Dashboard</span>
            </a>
            <a href="dashboard.html" class="sidebar-link" id="nav-files">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="currentColor" stroke-width="2"/>
                    <polyline points="14,2 14,8 20,8" stroke="currentColor" stroke-width="2"/>
                </svg>
                <span>My Files</span>
            </a>
            <a href="profile.html" class="sidebar-link sidebar-link--active" id="nav-profile">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="currentColor" stroke-width="2"/>
                    <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
                </svg>
                <span>Profile</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="storage-widget">
                <div class="storage-widget-header">
                    <span class="storage-label">Storage</span>
                    <span class="storage-percentage" id="sidebar-storage-percent">0%</span>
                </div>
                <div class="storage-bar-track">
                    <div class="storage-bar-fill" id="sidebar-storage-fill" style="width: 0%"></div>
                </div>
                <p class="storage-detail" id="sidebar-storage-detail">0 MB of 500 MB used</p>
            </div>

            <button class="sidebar-logout" id="logout-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <polyline points="16,17 21,12 16,7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <!-- ========== MAIN CONTENT ========== -->
    <main class="main-content">

        <header class="topbar">
            <div class="topbar-left">
                <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Toggle menu">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <line x1="3" y1="6" x2="21" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <line x1="3" y1="12" x2="21" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <line x1="3" y1="18" x2="21" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
                <div>
                    <h1 class="topbar-title">Profile</h1>
                    <p class="topbar-greeting">Your account details</p>
                </div>
            </div>
        </header>

        <!-- Profile Content -->
        <div class="profile-content" id="profile-loading">
            <div class="files-loading">
                <div class="loading-spinner"></div>
                <p>Loading profile...</p>
            </div>
        </div>

        <div class="profile-content" id="profile-main" style="display: none;">

            <!-- Profile Card -->
            <div class="profile-card">
                <div class="profile-avatar" id="profile-avatar">?</div>
                <div class="profile-info">
                    <h2 class="profile-name" id="profile-name">—</h2>
                    <p class="profile-email" id="profile-email">—</p>
                    <p class="profile-member" id="profile-member">Member since —</p>
                </div>
            </div>

            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card" id="stat-storage">
                    <div class="stat-icon stat-icon--blue">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                            <ellipse cx="12" cy="5" rx="9" ry="3" stroke="#2563EB" stroke-width="2"/>
                            <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5" stroke="#2563EB" stroke-width="2"/>
                            <path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3" stroke="#2563EB" stroke-width="2"/>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <p class="stat-label">Storage Used</p>
                        <p class="stat-value" id="stat-storage-used">0 MB</p>
                        <p class="stat-sub" id="stat-storage-sub">of 500 MB</p>
                    </div>
                </div>

                <div class="stat-card" id="stat-files">
                    <div class="stat-icon stat-icon--green">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="#22C55E" stroke-width="2"/>
                            <polyline points="14,2 14,8 20,8" stroke="#22C55E" stroke-width="2"/>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <p class="stat-label">Total Files</p>
                        <p class="stat-value" id="stat-file-count">0</p>
                        <p class="stat-sub">uploaded files</p>
                    </div>
                </div>

                <div class="stat-card" id="stat-quota">
                    <div class="stat-icon stat-icon--purple">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                            <path d="M12 2L4 6v6c0 5.5 3.5 10.7 8 12 4.5-1.3 8-6.5 8-12V6L12 2z" stroke="#7C3AED" stroke-width="2"/>
                            <path d="M9 12l2 2 4-4" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <p class="stat-label">Storage Quota</p>
                        <p class="stat-value">500 MB</p>
                        <p class="stat-sub">maximum storage</p>
                    </div>
                </div>
            </div>

            <!-- Storage Bar -->
            <div class="profile-storage-card">
                <div class="storage-bar-header">
                    <h3 class="storage-bar-title">Storage Usage</h3>
                    <span class="storage-bar-pct" id="profile-storage-pct">0%</span>
                </div>
                <div class="storage-bar-track storage-bar-track--lg">
                    <div class="storage-bar-fill" id="profile-storage-fill" style="width: 0%"></div>
                </div>
                <p class="storage-bar-detail" id="profile-storage-detail">0 MB used of 500 MB</p>
            </div>

            <!-- Logout -->
            <div class="profile-actions">
                <button class="btn btn-danger btn-outline-danger" id="profile-logout-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <polyline points="16,17 21,12 16,7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    Log Out
                </button>
            </div>

        </div>

    </main>

    <!-- Sidebar overlay for mobile -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <script src="js/dashboard.js"></script>
</body>
</html>
