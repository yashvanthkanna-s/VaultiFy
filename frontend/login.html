<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Log in to Vaultify — your secure personal file storage vault.">
    <title>Login — Vaultify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

    <div class="auth-wrapper">

        <div class="auth-form-container">
            <div style="text-align: center; margin-bottom: 32px;">
                <a href="index.html" class="nav-logo" style="justify-content: center;">
                    <div class="logo-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <rect x="2" y="4" width="20" height="16" rx="3" fill="#2563EB"/>
                            <path d="M7 9h10M7 12h7" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                            <circle cx="18" cy="16" r="4" fill="#1D4ED8"/>
                            <path d="M16.5 16l1 1 2-2" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <span class="logo-text">Vaultify</span>
                </a>
            </div>
                <div class="auth-form-header">
                    <h1 class="auth-form-title">Log in</h1>
                    <p class="auth-form-subtitle">
                        No account? 
                        <a href="signup.html" class="auth-link" id="go-signup">Sign up</a>
                    </p>
                </div>

                <!-- Error Message -->
                <div class="alert alert-error" id="login-error" style="display: none;"></div>

                <!-- Login Form -->
                <form id="login-form" class="auth-form" novalidate>

                    <div class="form-group">
                        <label for="email" class="form-label">Email address</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            class="form-input"
                            placeholder="you@example.com"
                            autocomplete="email"
                            required
                        />
                        <span class="form-error" id="email-error"></span>
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-wrapper">
                            <input
                                type="password"
                                id="password"
                                name="password"
                                class="form-input"
                                placeholder="Enter your password"
                                autocomplete="current-password"
                                required
                            />
                            <button type="button" class="toggle-password" id="toggle-pwd" aria-label="Toggle password visibility">
                                <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="#9CA3AF" stroke-width="2"/>
                                    <circle cx="12" cy="12" r="3" stroke="#9CA3AF" stroke-width="2"/>
                                </svg>
                            </button>
                        </div>
                        <span class="form-error" id="password-error"></span>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-btn">
                        <span id="login-btn-text">Sign In</span>
                        <span id="login-spinner" class="btn-spinner" style="display: none;"></span>
                    </button>

                </form>
        </div>

    </div>

    <script src="js/login.js"></script>
</body>
</html>
